services:
  postgres:
    image: postgres:18-alpine
    container_name: talon-postgres-local
    environment:
      POSTGRES_DB: talon
      POSTGRES_USER: talon
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talon -d talon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
